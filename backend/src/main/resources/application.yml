spring:
  application:
    name: strategy-builder-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/strategybuilder
    username: sb_user
    password: sb_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/strategybuilder
    user: sb_user
    password: sb_pass
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    org.flywaydb: DEBUG