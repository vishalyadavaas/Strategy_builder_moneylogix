spring:
  application:
    name: strategy-builder-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/strategybuilder
    username: sb_user
    password: sb_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "5"
logging:
  level:
    com.moneylogix: DEBUG